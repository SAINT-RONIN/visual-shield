server {
    listen 80;
    server_name localhost;
    root /app/public;
    index index.php;
    client_max_body_size 500M;
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        set $php_upstream php:9000;
        fastcgi_pass $php_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Internal-only location used by X-Accel-Redirect.
    # PHP authenticates the request, then hands off to nginx to serve the
    # file directly — no PHP buffering, native range-request support.
    location /internal-videos/ {
        internal;
        alias /app/storage/videos/;
    }

    location ~ /\.ht {
        deny all;
    }
}
