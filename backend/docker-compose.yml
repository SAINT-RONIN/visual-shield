services:
  php:
    build:
      context: .
      dockerfile: PHP.Dockerfile
    volumes:
      - ./app:/app
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-visual_shield}
      MYSQL_USER: ${MYSQL_USER:-vs_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vs_password}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-visual-shield-local-dev-secret}
      JWT_ISSUER: ${JWT_ISSUER:-visual-shield}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - visual-shield

  worker:
    build:
      context: .
      dockerfile: PHP.Dockerfile
    command: php /app/cli/worker.php
    volumes:
      - ./app:/app
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-visual_shield}
      MYSQL_USER: ${MYSQL_USER:-vs_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vs_password}
      JWT_SECRET: ${JWT_SECRET:-visual-shield-local-dev-secret}
      JWT_ISSUER: ${JWT_ISSUER:-visual-shield}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - visual-shield

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-8081}:80"
    volumes:
      - ./app:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - visual-shield

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-visual_shield}
      MYSQL_USER: ${MYSQL_USER:-vs_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vs_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD:-root} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks:
      - visual-shield

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: ${MYSQL_HOST:-mysql}
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - visual-shield

networks:
  visual-shield:
    driver: bridge

volumes:
  mysql_data:
